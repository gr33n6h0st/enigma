<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enigma M3: Engineering Lab</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

        :root {
            --wood-frame: #2d1b0d;
            --faceplate: #1c1c1c;
            --gold-leaf: #d4af37;
            --tape-paper: #fdfae6;
        }

        body {
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            font-family: 'Special Elite', serif;
            color: #ddd;
        }

        /* The Main Wooden Case */
        .enigma-chassis {
            background: linear-gradient(145deg, #4e342e, #261a13);
            border: 12px solid #1a0f08;
            border-radius: 4px;
            padding: 35px;
            width: 820px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        .faceplate {
            background: radial-gradient(circle, #333 0%, #111 100%);
            border: 4px solid #000;
            padding: 25px;
            border-radius: 2px;
            box-shadow: inset 0 0 40px rgba(0,0,0,1);
        }

        /* Rotors */
        .rotor-section {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
        }

        .rotor-slot {
            background: #000;
            padding: 8px;
            border: 2px solid #444;
            border-radius: 4px;
            box-shadow: inset 0 8px 12px #000;
        }

        .rotor-wheel {
            background: linear-gradient(to bottom, #333 0%, #eee 45%, #eee 55%, #333 100%);
            color: #000;
            font-size: 36px;
            font-weight: bold;
            width: 55px;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            border-left: 3px solid #222;
            border-right: 3px solid #222;
        }

        /* Lampboard */
        .lamp-bay {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .lamp-hole {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #333, #000);
            border: 2px solid #222;
            line-height: 50px;
            text-align: center;
            font-size: 20px;
            color: #444;
            box-shadow: inset 0 4px 8px #000;
        }

        .lamp-hole.lit {
            background: radial-gradient(circle at 30% 30%, #fff, #ffcc00);
            color: #000;
            box-shadow: 0 0 35px #ffcc00, inset 0 0 5px #fff;
        }

        /* Dual Tapes */
        .tape-readout {
            background: var(--tape-paper);
            color: #222;
            padding: 12px;
            font-size: 18px;
            letter-spacing: 4px;
            border-radius: 2px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
            min-height: 22px;
            text-align: left;
            margin-bottom: 10px;
            border-left: 8px solid #34495e; /* Blue for input */
        }
        #output-tape { border-left: 8px solid var(--gold-leaf); background: #fffdf0; }

        /* Plugboard */
        .plugboard {
            background: #050505;
            padding: 20px;
            border-radius: 4px;
            position: relative;
            border: 1px solid #222;
        }

        .socket-grid {
            display: grid;
            grid-template-columns: repeat(13, 1fr);
            gap: 12px;
            z-index: 2;
            position: relative;
        }

        .socket-pair { display: flex; flex-direction: column; align-items: center; }

        .socket {
            width: 28px;
            height: 28px;
            background: #000;
            border: 3px solid #444;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: inset 0 2px 4px #000;
        }

        .socket.active { border-color: #fff; box-shadow: 0 0 10px #fff; }

        #cable-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }

        /* Control Panel */
        .controls {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            background: #3e2723;
            color: #d7ccc8;
            border: 2px solid #1b110b;
            padding: 10px 20px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Special Elite', serif;
            box-shadow: 0 4px 0 #000;
        }

        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
    </style>
</head>
<body onload="init()">

    <div class="enigma-chassis">
        <div class="faceplate">
            <div class="rotor-section">
                <div class="rotor-slot"><div id="rL" class="rotor-wheel" onclick="manualStep(0)">A</div></div>
                <div class="rotor-slot"><div id="rM" class="rotor-wheel" onclick="manualStep(1)">A</div></div>
                <div class="rotor-slot"><div id="rR" class="rotor-wheel" onclick="manualStep(2)">A</div></div>
            </div>

            <div class="lamp-bay" id="lamp-bay"></div>

            <div id="input-tape" class="tape-readout"></div>
            <div id="output-tape" class="tape-readout"></div>

            <div class="plugboard" id="p-container">
                <canvas id="cable-canvas"></canvas>
                <div class="socket-grid" id="s-grid"></div>
            </div>

            <div class="controls">
                <button onclick="fullReset()">RESET ROTORS (AAA)</button>
                <button onclick="clearTapes()" style="background:#546e7a">CLEAR TAPES</button>
                <button onclick="clearPlugs()" style="background:#263238">PULL ALL CABLES</button>
            </div>
        </div>
    </div>

<script>
    const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const rotors = ["EKMFLGDQVZNTOWYHXUSPAIBRCJ", "AJDKSIRUXBLHWTMCQGZNPYFVOE", "BDFHJLCPRTXVZNYEIWGAKMUSQO"];
    const reflector = "YRUHQSLDPXNGOKMIEBFZCWVJAT";
    let p = [0, 0, 0];
    let history = [];
    let plugMap = {};
    let selected = null;
    const colors = ["#e74c3c", "#3498db", "#2ecc71", "#f1c40f", "#9b59b6", "#e67e22", "#1abc9c"];

    function init() {
        const lb = document.getElementById('lamp-bay');
        const sg = document.getElementById('s-grid');
        alpha.split('').forEach(c => {
            lb.innerHTML += `<div class="lamp-hole" id="L-${c}">${c}</div>`;
            sg.innerHTML += `<div class="socket-pair"><div class="socket" id="S-${c}" onclick="handlePlug('${c}')"></div><span style="font-size:10px; margin-top:3px">${c}</span></div>`;
        });
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 100);
        updateUI();
    }

    function handlePlug(c) {
        if (plugMap[c]) {
            const partner = plugMap[c];
            delete plugMap[c]; delete plugMap[partner];
        } else if (selected === null) {
            selected = c;
            document.getElementById(`S-${c}`).classList.add('active');
        } else {
            if (selected !== c) {
                plugMap[selected] = c;
                plugMap[c] = selected;
            }
            document.getElementById(`S-${selected}`).classList.remove('active');
            selected = null;
        }
        drawCables();
    }

    function drawCables() {
        const canvas = document.getElementById('cable-canvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const drawn = new Set();
        const rect = canvas.getBoundingClientRect();
        let colorIdx = 0;

        for (let s in plugMap) {
            if (drawn.has(s)) continue;
            const r1 = document.getElementById(`S-${s}`).getBoundingClientRect();
            const r2 = document.getElementById(`S-${plugMap[s]}`).getBoundingClientRect();
            ctx.beginPath();
            ctx.strokeStyle = colors[colorIdx % colors.length];
            ctx.lineWidth = 4;
            const x1 = r1.left - rect.left + 14;
            const y1 = r1.top - rect.top + 14;
            const x2 = r2.left - rect.left + 14;
            const y2 = r2.top - rect.top + 14;
            ctx.moveTo(x1, y1);
            ctx.bezierCurveTo(x1, y1 + 70, x2, y2 + 70, x2, y2);
            ctx.stroke();
            drawn.add(s); drawn.add(plugMap[s]);
            colorIdx++;
        }
    }

    function run(char) {
        history.push([...p]);
        let c = plugMap[char] || char;
        p[2] = (p[2] + 1) % 26;
        if (p[2] === 17) p[1] = (p[1] + 1) % 26; // Rotor turnover logic
        updateUI();
        let idx = alpha.indexOf(c);
        for (let i = 2; i >= 0; i--) { // Forward
            idx = (idx + p[i]) % 26;
            idx = alpha.indexOf(rotors[i][idx]);
            idx = (idx - p[i] + 26) % 26;
        }
        idx = alpha.indexOf(reflector[idx]); // Reflector
        for (let i = 0; i <= 2; i++) { // Backward
            idx = (idx + p[i]) % 26;
            idx = rotors[i].indexOf(alpha[idx]);
            idx = (idx - p[i] + 26) % 26;
        }
        return plugMap[alpha[idx]] || alpha[idx];
    }

    function updateUI() {
        document.getElementById('rL').innerText = alpha[p[0]];
        document.getElementById('rM').innerText = alpha[p[1]];
        document.getElementById('rR').innerText = alpha[p[2]];
    }

    function fullReset() { p = [0,0,0]; history = []; updateUI(); }
    function clearTapes() { document.getElementById('input-tape').innerText = ""; document.getElementById('output-tape').innerText = ""; history = []; }
    function clearPlugs() { plugMap = {}; drawCables(); }
    function manualStep(i) { p[i] = (p[i] + 1) % 26; history = []; updateUI(); }
    function resizeCanvas() { 
        const c = document.getElementById('cable-canvas');
        const container = document.getElementById('p-container');
        c.width = container.offsetWidth; c.height = container.offsetHeight;
        drawCables();
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === "Backspace") {
            if (history.length > 0) {
                p = history.pop();
                document.getElementById('input-tape').innerText = document.getElementById('input-tape').innerText.slice(0,-1);
                document.getElementById('output-tape').innerText = document.getElementById('output-tape').innerText.slice(0,-1);
                updateUI();
                document.querySelectorAll('.lamp-hole').forEach(l => l.classList.remove('lit'));
            }
            e.preventDefault(); return;
        }
        const char = e.key.toUpperCase();
        if (alpha.includes(char) && char.length === 1) {
            document.querySelectorAll('.lamp-hole').forEach(l => l.classList.remove('lit'));
            const res = run(char);
            document.getElementById(`L-${res}`).classList.add('lit');
            document.getElementById('input-tape').innerText += char;
            document.getElementById('output-tape').innerText += res;
        }
    });
</script>
</body>
</html>

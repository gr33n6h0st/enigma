<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enigma Engineering Lab</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #121212; color: #e0e0e0; text-align: center; padding: 10px; }
        .case { background: #222; border: 4px solid #444; border-radius: 10px; width: 800px; margin: 0 auto; padding: 20px; box-shadow: 0 0 30px #000; }
        .rotor-display { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .rotor { background: #eee; color: #111; padding: 15px; border-radius: 4px; width: 40px; font-size: 30px; font-weight: bold; border-bottom: 5px solid #888; }
        .lampboard { display: grid; grid-template-columns: repeat(9, 1fr); gap: 10px; margin: 20px 0; }
        .lamp { background: #333; border: 2px solid #444; border-radius: 50%; width: 40px; height: 40px; line-height: 40px; color: #666; font-weight: bold; }
        .lamp.active { background: #ffcc00; color: #000; box-shadow: 0 0 20px #ffcc00; border: 2px solid #fff; }
        .plugboard-area { background: #111; padding: 15px; border-radius: 5px; margin-top: 20px; border: 1px dashed #555; }
        #plugs { width: 90%; background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; font-size: 16px; letter-spacing: 2px; }
        #trace { background: #000; color: #0f0; text-align: left; padding: 15px; height: 120px; overflow-y: auto; font-size: 12px; margin-top: 15px; border: 1px solid #333; }
        input[type="text"]#kb { width: 80%; padding: 15px; font-size: 20px; margin: 15px 0; background: #333; color: #fff; border: none; border-radius: 5px; text-transform: uppercase; }
        button { background: #c0392b; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>ENIGMA SYSTEM SIMULATOR</h2>
    
    <div class="case">
        <div class="rotor-display">
            <div><div id="r0" class="rotor">A</div><small>L</small></div>
            <div><div id="r1" class="rotor">A</div><small>M</small></div>
            <div><div id="r2" class="rotor">A</div><small>R</small></div>
        </div>

        <div class="lampboard" id="lb"></div>

        <input type="text" id="kb" placeholder="TYPE HERE..." autocomplete="off">

        <div class="plugboard-area">
            <label>PLUGBOARD (e.g., AZ BC):</label><br>
            <input type="text" id="plugs" placeholder="PAIRS TO SWAP" value="">
        </div>

        <div class="controls" style="margin-top:15px;">
            <button onclick="resetMachine()">FACTORY RESET (AAA)</button>
        </div>

        <div id="trace">System initialized. Awaiting hardware input...</div>
    </div>

<script>
    const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const rWiring = ["EKMFLGDQVZNTOWYHXUSPAIBRCJ", "AJDKSIRUXBLHWTMCQGZNPYFVOE", "BDFHJLCPRTXVZNYEIWGAKMUSQO"];
    const reflector = "YRUHQSLDPXNGOKMIEBFZCWVJAT";
    let p = [0, 0, 0];

    // Build Lamps
    const lb = document.getElementById('lb');
    alpha.split('').forEach(c => {
        lb.innerHTML += `<div class="lamp" id="lamp-${c}">${c}</div>`;
    });

    function getPlug(c) {
        let pairs = document.getElementById('plugs').value.toUpperCase().split(' ');
        for (let pair of pairs) {
            if (pair.length === 2) {
                if (pair[0] === c) return pair[1];
                if (pair[1] === c) return pair[0];
            }
        }
        return c;
    }

    function resetMachine() {
        p = [0, 0, 0];
        document.getElementById('kb').value = "";
        document.getElementById('trace').innerText = "Rotors Reset.";
        updateUI();
    }

    function run(inputChar) {
        let log = `In: ${inputChar}`;
        
        // 1. Plugboard In (S)
        let c = getPlug(inputChar);
        log += ` -> Plug: ${c}`;

        // 2. Step
        p[2] = (p[2] + 1) % 26;
        if (p[2] === 17) p[1] = (p[1] + 1) % 26;
        updateUI();

        // 3. Rotors Forward
        let idx = alpha.indexOf(c);
        for (let i = 2; i >= 0; i--) {
            idx = (idx + p[i]) % 26;
            idx = alpha.indexOf(rWiring[i][idx]);
            idx = (idx - p[i] + 26) % 26;
        }
        log += ` -> Rotors: ${alpha[idx]}`;

        // 4. Reflector (R)
        idx = alpha.indexOf(reflector[idx]);
        log += ` -> Reflector: ${alpha[idx]}`;

        // 5. Rotors Back
        for (let i = 0; i <= 2; i++) {
            idx = (idx + p[i]) % 26;
            idx = rWiring[i].indexOf(alpha[idx]);
            idx = (idx - p[i] + 26) % 26;
        }

        // 6. Plugboard Out (S)
        let out = getPlug(alpha[idx]);
        log += ` -> Out: ${out}`;
        
        document.getElementById('trace').innerText = log + "\n" + document.getElementById('trace').innerText;
        return out;
    }

    function updateUI() {
        document.getElementById('r0').innerText = alpha[p[0]];
        document.getElementById('r1').innerText = alpha[p[1]];
        document.getElementById('r2').innerText = alpha[p[2]];
    }

    document.getElementById('kb').addEventListener('keydown', (e) => {
        let char = e.key.toUpperCase();
        if (alpha.includes(char) && char.length === 1) {
            document.querySelectorAll('.lamp').forEach(l => l.classList.remove('active'));
            let result = run(char);
            document.getElementById('lamp-' + result).classList.add('active');
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enigma M3: Mechanical Engineering Lab</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Fira+Code:wght@400;700&display=swap');

        :root {
            --wood-frame: #2d1b0d;
            --gold-leaf: #d4af37;
            --tape-paper: #fdfae6;
            --logic-green: #00ff41;
        }

        body {
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Special Elite', serif;
            color: #ddd;
        }

        .enigma-chassis {
            background: linear-gradient(145deg, #4e342e, #261a13);
            border: 12px solid #1a0f08;
            border-radius: 4px;
            padding: 30px;
            width: 850px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        .faceplate {
            background: radial-gradient(circle, #333 0%, #111 100%);
            border: 4px solid #000;
            padding: 20px;
            border-radius: 2px;
            box-shadow: inset 0 0 40px rgba(0,0,0,1);
        }

        /* --- ROTOR ANIMATION LOGIC --- */
        .rotor-section { display: flex; justify-content: center; gap: 25px; margin-bottom: 20px; }
        
        .rotor-slot { 
            background: #000; 
            padding: 5px; 
            border: 3px solid #333; 
            border-radius: 4px; 
            overflow: hidden; /* Clips the spinning wheel */
            height: 80px;
            width: 60px;
            position: relative;
            box-shadow: inset 0 10px 10px #000;
        }

        .rotor-wheel {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #333 0%, #eee 45%, #eee 55%, #333 100%);
            color: #000;
            font-size: 40px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: transform 0.15s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        /* The "Spin" Animation Class */
        .spin-down {
            animation: clickDown 0.15s;
        }

        @keyframes clickDown {
            0% { transform: translateY(-100%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* Rest of the aesthetic styles */
        .logic-monitor { background: #000; border: 2px solid #444; padding: 10px; margin-bottom: 20px; font-family: 'Fira Code', monospace; font-size: 11px; color: var(--logic-green); display: none; border-left: 5px solid var(--logic-green); }
        .lamp-bay { display: grid; grid-template-columns: repeat(9, 1fr); gap: 10px; margin-bottom: 25px; }
        .lamp-hole { width: 45px; height: 45px; border-radius: 50%; background: #111; border: 2px solid #222; line-height: 45px; text-align: center; font-size: 18px; color: #444; box-shadow: inset 0 4px 8px #000; }
        .lamp-hole.lit { background: radial-gradient(circle at 30% 30%, #fff, #ffcc00); color: #000; box-shadow: 0 0 30px #ffcc00; }
        .tape-readout { background: var(--tape-paper); color: #222; padding: 10px; font-size: 18px; letter-spacing: 4px; border-radius: 2px; min-height: 20px; text-align: left; margin-bottom: 8px; border-left: 8px solid #34495e; text-transform: uppercase; }
        #output-tape { border-left: 8px solid var(--gold-leaf); }
        .plugboard { background: #050505; padding: 15px; border-radius: 4px; position: relative; }
        .socket-grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 10px; z-index: 2; position: relative; }
        .socket { width: 25px; height: 25px; background: #000; border: 3px solid #444; border-radius: 50%; cursor: pointer; }
        .socket.active { border-color: #fff; box-shadow: 0 0 10px #fff; }
        #cable-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
        .controls { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        button { background: #3e2723; color: #d7ccc8; border: 2px solid #1b110b; padding: 8px 15px; border-radius: 3px; cursor: pointer; font-weight: bold; font-family: 'Special Elite', serif; font-size: 11px; box-shadow: 0 3px 0 #000; }
        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #000; }
    </style>
</head>
<body onload="init()">

    <div class="enigma-chassis">
        <div class="faceplate">
            <div id="logic-box" class="logic-monitor">> WAITING FOR HARDWARE INPUT...</div>

            <div class="rotor-section">
                <div class="rotor-slot"><div id="rL" class="rotor-wheel" onclick="manualStep(0)">A</div></div>
                <div class="rotor-slot"><div id="rM" class="rotor-wheel" onclick="manualStep(1)">A</div></div>
                <div class="rotor-slot"><div id="rR" class="rotor-wheel" onclick="manualStep(2)">A</div></div>
            </div>

            <div class="lamp-bay" id="lamp-bay"></div>

            <div id="input-tape" class="tape-readout"></div>
            <div id="output-tape" class="tape-readout"></div>

            <div class="plugboard" id="p-container">
                <canvas id="cable-canvas"></canvas>
                <div class="socket-grid" id="s-grid"></div>
            </div>

            <div class="controls">
                <button onclick="toggleLogic()">TOGGLE LOGIC MONITOR</button>
                <button onclick="fullReset()">RESET ROTORS</button>
                <button onclick="clearTapes()" style="background:#546e7a">CLEAR TAPES</button>
                <button onclick="clearPlugs()" style="background:#263238">PULL CABLES</button>
            </div>
        </div>
    </div>

<script>
    const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const rotors = ["EKMFLGDQVZNTOWYHXUSPAIBRCJ", "AJDKSIRUXBLHWTMCQGZNPYFVOE", "BDFHJLCPRTXVZNYEIWGAKMUSQO"];
    const reflector = "YRUHQSLDPXNGOKMIEBFZCWVJAT";
    let p = [0, 0, 0];
    let history = [];
    let plugMap = {};
    let selected = null;
    const colors = ["#e74c3c", "#3498db", "#2ecc71", "#f1c40f", "#9b59b6", "#e67e22"];

    function init() {
        const lb = document.getElementById('lamp-bay');
        const sg = document.getElementById('s-grid');
        alpha.split('').forEach(c => {
            lb.innerHTML += `<div class="lamp-hole" id="L-${c}">${c}</div>`;
            sg.innerHTML += `<div style="display:flex; flex-direction:column; align-items:center;"><div class="socket" id="S-${c}" onclick="handlePlug('${c}')"></div><span style="font-size:9px; margin-top:2px">${c}</span></div>`;
        });
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 100);
        updateUI();
    }

    function toggleLogic() {
        const box = document.getElementById('logic-box');
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    function handlePlug(c) {
        if (plugMap[c]) {
            const partner = plugMap[c];
            delete plugMap[c]; delete plugMap[partner];
        } else if (selected === null) {
            selected = c;
            document.getElementById(`S-${c}`).classList.add('active');
        } else {
            if (selected !== c) { plugMap[selected] = c; plugMap[c] = selected; }
            document.getElementById(`S-${selected}`).classList.remove('active');
            selected = null;
        }
        drawCables();
    }

    function drawCables() {
        const canvas = document.getElementById('cable-canvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const drawn = new Set();
        const rect = canvas.getBoundingClientRect();
        let colorIdx = 0;
        for (let s in plugMap) {
            if (drawn.has(s)) continue;
            const r1 = document.getElementById(`S-${s}`).getBoundingClientRect();
            const r2 = document.getElementById(`S-${plugMap[s]}`).getBoundingClientRect();
            ctx.beginPath();
            ctx.strokeStyle = colors[colorIdx % colors.length];
            ctx.lineWidth = 3;
            const x1 = r1.left - rect.left + 12;
            const y1 = r1.top - rect.top + 12;
            const x2 = r2.left - rect.left + 12;
            const y2 = r2.top - rect.top + 12;
            ctx.moveTo(x1, y1);
            ctx.bezierCurveTo(x1, y1 + 60, x2, y2 + 60, x2, y2);
            ctx.stroke();
            drawn.add(s); drawn.add(plugMap[s]);
            colorIdx++;
        }
    }

    function run(char) {
        history.push([...p]);
        let oldP = [...p];
        let steps = [];
        
        let current = plugMap[char] || char;
        steps.push(`INPUT: ${char} -> PLUGBOARD: ${current}`);
        
        // Logical Stepping
        p[2] = (p[2] + 1) % 26;
        let middleStepped = false;
        if (p[2] === 17) { p[1] = (p[1] + 1) % 26; middleStepped = true; }
        
        // Trigger Animations for changed rotors
        triggerSpin('rR');
        if (middleStepped) triggerSpin('rM');
        if (p[1] === 17 && middleStepped) { p[0] = (p[0] + 1) % 26; triggerSpin('rL'); }

        updateUI();

        let idx = alpha.indexOf(current);
        for (let i = 2; i >= 0; i--) {
            idx = (idx + p[i]) % 26;
            idx = alpha.indexOf(rotors[i][idx]);
            idx = (idx - p[i] + 26) % 26;
        }
        idx = alpha.indexOf(reflector[idx]);
        for (let i = 0; i <= 2; i++) {
            idx = (idx + p[i]) % 26;
            idx = rotors[i].indexOf(alpha[idx]);
            idx = (idx - p[i] + 26) % 26;
        }

        let result = plugMap[alpha[idx]] || alpha[idx];
        document.getElementById('logic-box').innerHTML = "> ROTOR STEPPED. PATH UPDATED.<br>> RESULT: " + result;
        return result;
    }

    function triggerSpin(id) {
        const el = document.getElementById(id);
        el.classList.remove('spin-down');
        void el.offsetWidth; // Force reflow to restart animation
        el.classList.add('spin-down');
    }

    function updateUI() {
        document.getElementById('rL').innerText = alpha[p[0]];
        document.getElementById('rM').innerText = alpha[p[1]];
        document.getElementById('rR').innerText = alpha[p[2]];
    }

    function fullReset() { p = [0,0,0]; history = []; updateUI(); }
    function clearTapes() { document.getElementById('input-tape').innerText = ""; document.getElementById('output-tape').innerText = ""; history = []; }
    function clearPlugs() { plugMap = {}; drawCables(); }
    function manualStep(i) { 
        p[i] = (p[i] + 1) % 26; 
        triggerSpin(['rL','rM','rR'][i]);
        history = []; 
        updateUI(); 
    }
    function resizeCanvas() { 
        const c = document.getElementById('cable-canvas');
        const container = document.getElementById('p-container');
        c.width = container.offsetWidth; c.height = container.offsetHeight;
        drawCables();
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === "Backspace") {
            if (history.length > 0) {
                p = history.pop();
                document.getElementById('input-tape').innerText = document.getElementById('input-tape').innerText.slice(0,-1);
                document.getElementById('output-tape').innerText = document.getElementById('output-tape').innerText.slice(0,-1);
                updateUI();
                document.querySelectorAll('.lamp-hole').forEach(l => l.classList.remove('lit'));
            }
            e.preventDefault(); return;
        }
        const char = e.key.toUpperCase();
        if (alpha.includes(char) && char.length === 1) {
            document.querySelectorAll('.lamp-hole').forEach(l => l.classList.remove('lit'));
            const res = run(char);
            document.getElementById(`L-${res}`).classList.add('lit');
            document.getElementById('input-tape').innerText += char;
            document.getElementById('output-tape').innerText += res;
        }
    });
</script>
</body>
</html>

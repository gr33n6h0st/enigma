<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enigma M3 Engineering Simulator</title>
    <style>
        :root { --panel: #2c3e50; --gold: #f1c40f; --blue: #3498db; --lamp-off: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .machine-case { background: var(--panel); border: 8px solid #111; border-radius: 12px; padding: 25px; width: 850px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); position: relative; }
        
        /* Rotors */
        .rotor-bay { display: flex; justify-content: center; gap: 30px; margin-bottom: 25px; background: #1a1a1a; padding: 20px; border-radius: 8px; border: 2px solid #444; }
        .rotor-unit { text-align: center; }
        .rotor-val { background: #fff; color: #000; font-size: 36px; font-weight: bold; padding: 10px; border-radius: 6px; width: 55px; cursor: pointer; border-bottom: 6px solid #888; user-select: none; }

        /* Lampboard */
        .lampboard { display: grid; grid-template-columns: repeat(9, 1fr); gap: 12px; margin: 25px 0; }
        .lamp { width: 45px; height: 45px; border-radius: 50%; background: var(--lamp-off); border: 2px solid #111; line-height: 45px; text-align: center; font-weight: bold; color: #555; font-size: 18px; }
        .lamp.active { background: var(--gold); color: black; box-shadow: 0 0 25px var(--gold); border-color: #fff; }

        /* Dual Tapes */
        .tape-label { font-size: 12px; color: #bdc3c7; margin-bottom: 4px; text-align: left; width: 90%; margin-left: 5%; font-weight: bold; }
        .tape { background: #eee; color: #111; padding: 12px; min-height: 30px; font-size: 20px; font-weight: bold; letter-spacing: 4px; border-radius: 4px; width: 90%; margin: 0 auto 15px auto; font-family: 'Courier New', monospace; overflow-x: auto; white-space: nowrap; }
        #input-tape { border-left: 10px solid var(--blue); }
        #output-tape { border-left: 10px solid var(--gold); background: #fff; }

        /* Plugboard */
        .plugboard-box { position: relative; background: #000; padding: 30px; border-radius: 8px; border: 2px solid #444; }
        .plug-grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 18px; position: relative; z-index: 2; }
        .socket { width: 34px; height: 34px; border-radius: 50%; background: #222; border: 2px solid #7f8c8d; cursor: pointer; font-size: 11px; line-height: 34px; text-align: center; user-select: none; color: #95a5a6; }
        .socket.selected { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); color: white; }
        #cable-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
        
        .btns { margin-top: 25px; display: flex; gap: 10px; justify-content: center; }
        button { background: #c0392b; color: white; border: none; padding: 12px 24px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .hint { margin-top: 15px; color: #7f8c8d; font-size: 13px; }
    </style>
</head>
<body onload="init()">

    <h2 style="margin-bottom: 15px;">ENIGMA M3 ENGINEERING LAB</h2>
    <div class="machine-case">
        
        <div class="rotor-bay">
            <div class="rotor-unit"><div id="rL" class="rotor-val" onclick="manualStep(0)">A</div><small>LEFT</small></div>
            <div class="rotor-unit"><div id="rM" class="rotor-val" onclick="manualStep(1)">A</div><small>MIDDLE</small></div>
            <div class="rotor-unit"><div id="rR" class="rotor-val" onclick="manualStep(2)">A</div><small>RIGHT</small></div>
        </div>

        <div class="lampboard" id="lboard"></div>

        <div class="tape-label">KEYBOARD (WHAT YOU TYPED):</div>
        <div id="input-tape" class="tape"></div>

        <div class="tape-label">ENCRYPTED OUTPUT (RESULT):</div>
        <div id="output-tape" class="tape"></div>

        <div class="plugboard-box" id="p-container">
            <canvas id="cable-canvas"></canvas>
            <div class="plug-grid" id="pgrid"></div>
        </div>

        <div class="btns">
            <button onclick="fullReset()">RESET EVERYTHING</button>
            <button onclick="clearPlugs()" style="background:#34495e">REMOVE CABLES</button>
        </div>
    </div>
    <div class="hint">Type to encrypt. Use <b>Backspace</b> to correct mistakes. Click rotors to set starting key.</div>

<script>
    const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const wiring = ["EKMFLGDQVZNTOWYHXUSPAIBRCJ", "AJDKSIRUXBLHWTMCQGZNPYFVOE", "BDFHJLCPRTXVZNYEIWGAKMUSQO"];
    const reflect = "YRUHQSLDPXNGOKMIEBFZCWVJAT";
    
    let p = [0, 0, 0];
    let history = []; 
    let plugMap = {};
    let selectedSocket = null;
    const colors = ["#e74c3c", "#3498db", "#2ecc71", "#f1c40f", "#9b59b6", "#e67e22"];

    function init() {
        const lb = document.getElementById('lboard');
        const pg = document.getElementById('pgrid');
        alpha.split('').forEach(c => {
            lb.innerHTML += `<div class="lamp" id="lamp-${c}">${c}</div>`;
            pg.innerHTML += `<div class="socket" id="plug-${c}" onclick="handlePlug('${c}')">${c}</div>`;
        });
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 100);
        updateUI();
    }

    function handlePlug(c) {
        if (plugMap[c]) {
            const partner = plugMap[c];
            delete plugMap[c]; delete plugMap[partner];
        } else if (selectedSocket === null) {
            selectedSocket = c;
            document.getElementById(`plug-${c}`).classList.add('selected');
        } else {
            if (selectedSocket !== c) {
                plugMap[selectedSocket] = c;
                plugMap[c] = selectedSocket;
            }
            document.getElementById(`plug-${selectedSocket}`).classList.remove('selected');
            selectedSocket = null;
        }
        drawCables();
    }

    function drawCables() {
        const canvas = document.getElementById('cable-canvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let colorIdx = 0;
        const drawn = new Set();
        const cRect = canvas.getBoundingClientRect();

        for (let s in plugMap) {
            if (drawn.has(s)) continue;
            const r1 = document.getElementById(`plug-${s}`).getBoundingClientRect();
            const r2 = document.getElementById(`plug-${plugMap[s]}`).getBoundingClientRect();
            ctx.beginPath();
            ctx.strokeStyle = colors[colorIdx % colors.length];
            ctx.lineWidth = 4;
            const x1 = r1.left - cRect.left + 17;
            const y1 = r1.top - cRect.top + 17;
            const x2 = r2.left - cRect.left + 17;
            const y2 = r2.top - cRect.top + 17;
            ctx.moveTo(x1, y1);
            ctx.bezierCurveTo(x1, y1 + 50, x2, y2 + 50, x2, y2);
            ctx.stroke();
            drawn.add(s); drawn.add(plugMap[s]);
            colorIdx++;
        }
    }

    function run(char) {
        history.push([...p]);
        let c = plugMap[char] || char;
        p[2] = (p[2] + 1) % 26;
        if (p[2] === 17) p[1] = (p[1] + 1) % 26;
        updateUI();
        let idx = alpha.indexOf(c);
        for (let i = 2; i >= 0; i--) {
            idx = (idx + p[i]) % 26;
            idx = alpha.indexOf(wiring[i][idx]);
            idx = (idx - p[i] + 26) % 26;
        }
        idx = alpha.indexOf(reflect[idx]);
        for (let i = 0; i <= 2; i++) {
            idx = (idx + p[i]) % 26;
            idx = wiring[i].indexOf(alpha[idx]);
            idx = (idx - p[i] + 26) % 26;
        }
        return plugMap[alpha[idx]] || alpha[idx];
    }

    function updateUI() {
        document.getElementById('rL').innerText = alpha[p[0]];
        document.getElementById('rM').innerText = alpha[p[1]];
        document.getElementById('rR').innerText = alpha[p[2]];
    }

    function fullReset() {
        p = [0,0,0]; history = [];
        document.getElementById('input-tape').innerText = "";
        document.getElementById('output-tape').innerText = "";
        updateUI();
    }

    function clearPlugs() { plugMap = {}; drawCables(); }
    function manualStep(i) { p[i] = (p[i] + 1) % 26; history = []; updateUI(); }

    function resizeCanvas() {
        const canvas = document.getElementById('cable-canvas');
        const container = document.getElementById('p-container');
        canvas.width = container.offsetWidth;
        canvas.height = container.offsetHeight;
        drawCables();
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === "Backspace") {
            if (history.length > 0) {
                p = history.pop();
                document.getElementById('input-tape').innerText = document.getElementById('input-tape').innerText.slice(0,-1);
                document.getElementById('output-tape').innerText = document.getElementById('output-tape').innerText.slice(0,-1);
                updateUI();
                document.querySelectorAll('.lamp').forEach(l => l.classList.remove('active'));
            }
            e.preventDefault();
            return;
        }
        const char = e.key.toUpperCase();
        if (alpha.includes(char) && char.length === 1) {
            document.querySelectorAll('.lamp').forEach(l => l.classList.remove('active'));
            const out = run(char);
            document.getElementById(`lamp-${out}`).classList.add('active');
            document.getElementById('input-tape').innerText += char;
            document.getElementById('output-tape').innerText += out;
        }
    });
</script>
</body>
</html>

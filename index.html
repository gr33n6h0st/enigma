<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enigma Simulator for Computer Engineering</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; color: white; text-align: center; }
        .machine-case { background: #34495e; border: 8px solid #222; border-radius: 15px; width: 600px; margin: 40px auto; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .rotor-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .rotor { background: #ecf0f1; color: #2c3e50; padding: 10px; border-radius: 5px; width: 60px; font-weight: bold; font-size: 24px; border: 3px solid #7f8c8d; }
        .lampboard { display: grid; grid-template-columns: repeat(9, 1fr); gap: 10px; margin-top: 20px; }
        .lamp { background: #444; border: 2px solid #000; border-radius: 50%; width: 40px; height: 40px; line-height: 40px; margin: auto; font-weight: bold; color: #777; transition: 0.1s; }
        .lamp.active { background: #f1c40f; color: #000; box-shadow: 0 0 20px #f1c40f; }
        input { margin-top: 30px; padding: 15px; width: 80%; font-size: 18px; text-transform: uppercase; border-radius: 5px; border: none; }
        .label { font-size: 12px; color: #bdc3c7; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>Mechanical State Machine: Enigma</h1>
    <p>Type a letter to see the "Circuit" change in real-time.</p>

    <div class="machine-case">
        <div class="rotor-container">
            <div><div id="rotor-L" class="rotor">A</div><div class="label">Left (k)</div></div>
            <div><div id="rotor-M" class="rotor">A</div><div class="label">Middle (j)</div></div>
            <div><div id="rotor-R" class="rotor">A</div><div class="label">Right (n)</div></div>
        </div>

        <div id="lampboard" class="lampboard"></div>
        
        <input type="text" id="keyboard" placeholder="CLICK HERE AND TYPE..." maxlength="50" autocomplete="off">
        <p id="output-text" style="font-family: monospace; letter-spacing: 3px; font-size: 20px; color: #f1c40f;"></p>
    </div>

<script>
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    // Real WWII Rotor I, II, III and Reflector B wiring
    const rotors = [
        "EKMFLGDQVZNTOWYHXUSPAIBRCJ", // Rotor I
        "AJDKSIRUXBLHWTMCQGZNPYFVOE", // Rotor II
        "BDFHJLCPRTXVZNYEIWGAKMUSQO"  // Rotor III
    ];
    const reflector = "YRUHQSLDPXNGOKMIEBFZCWVJAT";
    
    let pos = [0, 0, 0]; // [Left, Middle, Right]

    // Create Lampboard
    const lb = document.getElementById('lampboard');
    alphabet.split('').forEach(char => {
        const div = document.createElement('div');
        div.className = 'lamp';
        div.id = 'lamp-' + char;
        div.innerText = char;
        lb.appendChild(div);
    });

    function encrypt(char) {
        let charIdx = alphabet.indexOf(char);
        if (charIdx === -1) return "";

        // 1. STEPPING LOGIC (The Odometer)
        pos[2] = (pos[2] + 1) % 26; // Right rotor always steps
        if (pos[2] === 17) pos[1] = (pos[1] + 1) % 26; // Simplified turnover
        if (pos[1] === 5) pos[0] = (pos[0] + 1) % 26;

        updateUI();

        // 2. SIGNAL FORWARD (Through 3 rotors)
        for (let i = 2; i >= 0; i--) {
            charIdx = (charIdx + pos[i]) % 26;
            charIdx = alphabet.indexOf(rotors[i][charIdx]);
            charIdx = (charIdx - pos[i] + 26) % 26;
        }

        // 3. REFLECTOR
        charIdx = alphabet.indexOf(reflector[charIdx]);

        // 4. SIGNAL BACKWARD (Back through 3 rotors)
        for (let i = 0; i <= 2; i++) {
            charIdx = (charIdx + pos[i]) % 26;
            let targetChar = alphabet[charIdx];
            charIdx = rotors[i].indexOf(targetChar);
            charIdx = (charIdx - pos[i] + 26) % 26;
        }

        return alphabet[charIdx];
    }

    function updateUI() {
        document.getElementById('rotor-L').innerText = alphabet[pos[0]];
        document.getElementById('rotor-M').innerText = alphabet[pos[1]];
        document.getElementById('rotor-R').innerText = alphabet[pos[2]];
    }

    document.getElementById('keyboard').addEventListener('keydown', (e) => {
        const key = e.key.toUpperCase();
        if (alphabet.includes(key)) {
            // Reset lamps
            document.querySelectorAll('.lamp').forEach(l => l.classList.remove('active'));
            
            const result = encrypt(key);
            document.getElementById('lamp-' + result).classList.add('active');
            document.getElementById('output-text').innerText += result;
        }
    });
</script>
</body>
</html>
